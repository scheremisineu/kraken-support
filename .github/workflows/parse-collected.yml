name: Parse collected amount

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch balance from Privat24 API
        run: python3 scripts/fetch_balance.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/collected.json
          git diff --staged --quiet || git commit -m "chore: update collected amount [skip ci]"
          git push
